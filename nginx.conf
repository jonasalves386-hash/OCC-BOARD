# Nginx configuration for OCC Daily Board
# Place this file in: /etc/nginx/sites-available/occ-board
# Then: ln -s /etc/nginx/sites-available/occ-board /etc/nginx/sites-enabled/
# Test:  nginx -t
# Apply: systemctl reload nginx

server {
    listen 80;
    server_name meudominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name meudominio.com;

    ssl_certificate     /etc/letsencrypt/live/meudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meudominio.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FRONTEND ─────────────────────────────────────────────
    # Redirect bare /occboard → /occboard/
    location = /occboard {
        return 301 /occboard/;
    }

    # Serve frontend from Node (Express handles static files)
    location /occboard/ {
        proxy_pass         http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
